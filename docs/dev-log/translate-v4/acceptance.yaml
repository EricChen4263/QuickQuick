# 版本前置验收标准清单（开工前登记、冻结）
# 来源：机械派生自已冻结设计文档 docs/design/translation-sources-pot.md §五 V4（词典）
#       + §二.2.4（各源端点/返回形态）+ §四（结果形态枚举 Plain|Dict、HTML 解析用 scraper）+ §〇（独立重写）。
# 词典 4 源：Bing词典、剑桥、ECDICT、有道词典模式。需 DictEntry 结果类型 + 前端词典展示组件。
# 需 key/网页抓取源无法真网端到端验证：build/parse 走 objective 单测（mock/录制响应），真网归 manual_confirm。
# AI 只翻译不发明、不放宽；改标准走 change_log。

version: TV4
title: 词典源（对应设计文档 V4，新增 4 源 + DictEntry 重构 + 前端词典组件）
source_doc: docs/design/translation-sources-pot.md（§五 V4 / §二.2.4 / §四 / §〇）
frozen_at: 2026-06-06T00:00:00Z
criteria_freeze: TV4-criteria@2026-06-06

# 无 docs/STRATEGY.md → 战略层不启用。
# 本环境无 scripts/freeze-lint.sh（TV1-3 亦无），织三网由编排器手工核对：
#   coverage_check 每 covered 类别有匹配 category 验收项、无空洞；每 objective 项有可执行 verify；
#   每项有 source_anchor；真网/网页抓取不可机验项归 manual_confirm 并标 collect_env。

coverage_check:
  功能正确性:  covered
  测试充分性:  covered
  工程质量:    covered
  性能:        N/A (本版仅新增词典源解析与展示，无性能目标)
  UI还原度:    covered  # 本版新增前端词典展示组件，纳入 UI 还原度
  资源规范:    N/A (不新增二进制资源；scraper 为源码依赖)
  安全:        covered
  留痕产出:    covered
  人工确认点:  covered

acceptance:
  # ── TV4-F1 TranslateResponse 枚举重构（Plain|Dict + DictEntry）──────
  - id: TV4-F1-A01
    assertion: "TranslateResponse 从单译文 struct 重构为枚举 Plain(String)|Dict(DictEntry)，DictEntry 含音标/按词性分组释义/例句/发音/变形等结构化字段；既有 19 源（机翻+LLM）全部返回 Plain 变体且行为不回归（既有 provider 测试全绿）；DTO 序列化到前端带类型判别（tag），前端 TranslateResult 类型适配后既有 Plain 渲染不回归"
    category: 功能正确性
    source_anchor: 设计文档§四（结果形态枚举 Plain|Dict、前端按类型渲染）+ §二.2.4（DictEntry 字段）
    kind: objective
    verify:
      type: test_id
      ref: "translate_response_plain_variant_roundtrip, existing_providers_return_plain_no_regression, dict_entry_serializes_with_type_tag"
      runner: cd src-tauri && cargo test
      path: src-tauri/src/translate/mod.rs
      expect: pass
    evidence_ref: dev-log/translate-v4/f1-dictentry-refactor/test.md
    level: 大功能
    status: 待验

  # ── TV4-F2 ECDICT + 有道词典模式（JSON 词条）─────────────────────
  - id: TV4-F2-A01
    assertion: "ecdict（pot-app.com/api/dict POST，免 key）build_request 端点/body 正确、parse_response 解析英汉词条为 Dict(DictEntry)（音标/释义/词形）；youdao_dict（同有道翻译签名，isWord 模式）parse 在 isWord===true 时取 basic 音标/explains/词形为 Dict、否则回退 Plain；错误响应→TranslateError"
    category: 功能正确性
    source_anchor: 设计文档§二.2.4（ECDICT/有道词典 端点·返回形态）+ §〇
    kind: objective
    verify:
      type: test_id
      ref: "ecdict_build_and_parse_dict, youdao_dict_parses_basic_to_dict, youdao_dict_falls_back_to_plain_when_not_word"
      runner: cd src-tauri && cargo test
      path: src-tauri/src/translate/providers.rs
      expect: pass
    evidence_ref: dev-log/translate-v4/f2-ecdict-youdao/test.md
    level: 大功能
    status: 待验

  # ── TV4-F3 Bing词典（JSON）+ 剑桥（HTML scraper）+ 非词回退 ─────────
  - id: TV4-F3-A01
    assertion: "bing_dict（bing.com/api/v6/dictionarywords/search 硬编码 appid，免 key，非官方）parse JSON 为 Dict（音标/按词性分组释义/变形）；cambridge（dictionary.cambridge.org/search GET，HTML 用 scraper 解析）parse HTML 为 Dict（音标/音频/释义，仅英文输入）；非词输入或解析无结果时回退普通翻译或返回明确提示（不 panic）；错误/反爬响应→TranslateError"
    category: 功能正确性
    source_anchor: 设计文档§二.2.4（Bing词典/剑桥 端点·HTML 解析·仅英文）+ §四（scraper）+ §五.V4.验收（非词回退）+ §〇
    kind: objective
    verify:
      type: test_id
      ref: "bing_dict_parses_json_to_dict, cambridge_parses_html_to_dict, dict_source_falls_back_or_hints_on_non_word"
      runner: cd src-tauri && cargo test
      path: src-tauri/src/translate/providers.rs
      expect: pass
    evidence_ref: dev-log/translate-v4/f3-bing-cambridge/test.md
    level: 大功能
    status: 待验

  # ── TV4-F4 前端词典展示组件 ───────────────────────────────────────
  - id: TV4-F4-A01
    assertion: "前端 TranslateResult 支持 Plain|Dict 判别类型；新增词典展示组件按 DictEntry 渲染音标/按词性分组释义/例句/发音（可播放或显示音频入口）；Plain 结果仍走原译文渲染；Dict 结果渲染结构化词条；组件有 @testing-library/react 测试覆盖 Plain/Dict 两路径渲染"
    category: UI还原度
    source_anchor: 设计文档§五.V4（前端词典展示组件 音标/释义/例句/发音）+ §四（前端按类型渲染）
    kind: objective
    verify:
      type: test_id
      ref: "dict_result_renders_phonetic_and_definitions, plain_result_renders_translated_text, dict_component_renders_examples_and_audio"
      runner: pnpm test
      path: src/panels/translate/
      expect: pass
    evidence_ref: dev-log/translate-v4/f4-dict-ui/test.md
    level: 大功能
    status: 待验

  # ── 测试充分性 ────────────────────────────────────────────────────
  - id: TV4-A-TEST
    assertion: "每个新词典源有 build_request + parse_response 命中与错误/非词分支单测；HTML 解析有固定录制 HTML fixture 单测；前端组件有 Plain/Dict 渲染测试；全量 cargo test + cargo test --release + pnpm test 全绿（连跑 ≥3 次无 flaky）"
    category: 测试充分性
    source_anchor: 设计文档§五.V4.验收（词条结构正确解析与展示）+ hints（抗 flaky）
    kind: objective
    verify:
      type: command
      ref: "cd src-tauri && cargo test 全绿 且 cargo test --release 全绿；根目录 pnpm test 全绿；rtk proxy 取原始 'test … ok'/'N passed'（N≥1）"
      runner: cd src-tauri && cargo test; cargo test --release
      path: src-tauri/
      expect: pass
    evidence_ref: dev-log/translate-v4/*/test.md
    level: 版本
    status: 待验

  # ── 工程质量 ──────────────────────────────────────────────────────
  - id: TV4-A-QUAL
    assertion: "本版改动/新增无新增 clippy 警告（cargo clippy --all-targets -- -D warnings exit 0）、前端 tsc --noEmit 无错、无遗留 TODO/FIXME；新增 scraper 依赖合理（仅用于剑桥 HTML 解析）"
    category: 工程质量
    source_anchor: code-standards §工程质量
    kind: objective
    verify:
      type: command
      ref: "cd src-tauri && cargo clippy --all-targets -- -D warnings (exit 0)；前端 tsc --noEmit；grep 新增无 TODO/FIXME"
      runner: cd src-tauri && cargo clippy --all-targets -- -D warnings
      path: src-tauri/
      expect: pass
    evidence_ref: dev-log/translate-v4/*/coding.md
    level: 版本
    status: 待验

  # ── 安全 ──────────────────────────────────────────────────────────
  - id: TV4-A-SEC
    assertion: "词典源请求构造不把有道 key 等密钥写入 eprintln/log/错误消息；HTML 解析不引入注入风险（解析后取文本不执行脚本）；有道词典复用既有签名不泄密。证否泄露的单测用非空 sentinel 脏值（hints TV2-RETRO-1）"
    category: 安全
    source_anchor: code-standards §安全 + hints TV2-RETRO-1
    kind: objective
    verify:
      type: command
      ref: "grep 确认新增词典 provider 代码无将密钥写入 eprintln/println/log；有道词典缺字段/泄露单测用 sentinel 脏值断言 !contains"
      runner: cd src-tauri && grep -rn "eprintln\|println\|log::\|dbg!" src/translate/providers.rs
      path: src-tauri/src/translate/providers.rs
      expect: pass
    evidence_ref: dev-log/translate-v4/*/review.md
    level: 版本
    status: 待验

  # ── 留痕产出 ──────────────────────────────────────────────────────
  - id: TV4-A-LOG
    assertion: "本版每个小功能三联留痕齐（coding/test/review），每个大功能 feature-report.md，版本 version-verdict.md；commit 提交后回填真 hash"
    category: 留痕产出
    source_anchor: goal-dev 规范§五 + 目录约定
    kind: objective
    verify:
      type: command
      ref: "find dev-log/translate-v4 确认各大功能三联 + feature-report + 版本 verdict"
      runner: find docs/dev-log/translate-v4 -type f
      path: docs/dev-log/translate-v4/
      expect: pass
    evidence_ref: dev-log/translate-v4/
    level: 版本
    status: 待验

  # ── 人工确认点（真网/网页抓取/需有道 key，headless 采不了）──────────
  - id: TV4-M01
    assertion: "真网下 ecdict/bing词典/剑桥 对真实英文词返回正确词条结构并在前端正确展示；有道词典模式（用户配置 key）isWord 返回词条；非词输入回退普通翻译；剑桥音频可播放"
    category: 人工确认点
    source_anchor: 设计文档§五.V4.验收（词条展示 / 非词回退）
    kind: manual_confirm
    verify: null
    collect_env: real_device
    evidence_ref: dev-log/translate-v4/manual-dict-sources.png
    level: 版本
    status: 待采证

