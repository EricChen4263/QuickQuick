# 版本前置验收标准清单（开工前登记、冻结）
# 来源：从已冻结的 docs/QuickQuick-设计文档.md 机械派生——只翻译不发明、不放宽，每项带溯源锚。
# 冻结后改标准须走 change_log 显式留痕。制作人逐条核对，只有核对权、没有裁量权。

version: V0
title: Phase 0 骨架（脚手架 + 托盘/热键/预热窗口 + 加密DB与schema预埋）
source_doc: docs/QuickQuick-设计文档.md
frozen_at: 2026-05-31T00:00:00Z
criteria_freeze: V0-criteria@2026-05-31

# 分类覆盖检查：每个声明 covered 的类别，下方 acceptance 必须至少有一个 category 匹配条目。
coverage_check:
  功能正确性:  covered
  测试充分性:  covered
  工程质量:    covered                                   # lint·类型·构建·无TODO
  性能:        N/A (骨架阶段无量化性能阈值；预热窗口"瞬开"体感归人工确认点 V0-F2-A04)
  UI还原度:    N/A (Phase 0 无正式 UI 面板，仅空预热窗口；UI 还原在 Phase 1+ 面板阶段验收)
  资源规范:    covered                                   # 托盘/应用图标资源
  安全:        covered                                   # SQLCipher 加密 + 钥匙串 + 失败不静默删
  留痕产出:    covered
  人工确认点:  covered                                   # 托盘显示/热键唤起/瞬开体感（GUI 行为，headless 判不准）

# 大功能拆分（版本启动一次拆清，对齐验收骨架；小功能做到时滚动细拆）：
#   V0-F1 项目脚手架与构建  /  V0-F2 托盘+全局热键+预热窗口  /  V0-F3 加密数据库与schema预埋
acceptance:

  # ========== V0-F1 项目脚手架与构建 ==========
  - id: V0-F1-A01
    assertion: "Tauri 2.0（Rust）后端可编译通过"
    category: 功能正确性
    source_anchor: 设计文档§二（技术栈：Tauri 2.0 Rust 后端）
    kind: objective
    verify:
      type: command
      ref: "cargo build --manifest-path src-tauri/Cargo.toml"
      expect: pass
    evidence_ref: docs/dev-log/v0/f1-scaffold/s01-tauri-init/test.md
