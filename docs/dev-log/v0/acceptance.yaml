    source_anchor: 全局规范（完成定义：lint/类型检查过 + 无遗留 TODO/FIXME）
    kind: objective
    verify:
      type: command
      ref: "cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings && pnpm exec tsc --noEmit && ! grep -rn 'TODO\\|FIXME' src src-tauri/src"
      expect: pass
    evidence_ref: docs/dev-log/v0/f1-scaffold/s01-tauri-init/review.md
    level: 小功能
    status: 待验

