    added_at: 2026-05-31T12:00:00Z
    status: 待确认
    note: |
      当前实现走回退路径：启用 keyring apple-native feature，以 kSecAttrSynchronizable=false
      存储密钥（不漫游 iCloud），满足设计§六「不漫游」核心硬约束。但 kSecAttrAccessible 精确
      属性未被强制设为 AfterFirstUnlockThisDeviceOnly（keyring 默认为 WhenUnlocked）。
      强化方向：引入 security-framework crate，通过 SecAccessControl::create_with_protection(
      Some(ProtectionMode::AccessibleAfterFirstUnlockThisDeviceOnly), 0) 存取密钥，
      并使用 SecItemCopyMatching 回读属性验证。此项需真实 macOS 钥匙串人工验证，
      headless 自动测试不触碰真实 Keychain。
