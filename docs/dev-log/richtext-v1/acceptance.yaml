  # ── RT1-F1 后端富文本链路（捕获·存储·取数·还原）──────────────────
  - id: RT1-F1-A01
    assertion: "db 存储层支持 html：clip_items 新增 html_content TEXT 列；存量库（无列）经 PRAGMA table_info 守卫 + ALTER TABLE ADD COLUMN 幂等迁移后可写读；ingest 写入 item.html，kind = html.is_some() ? 'richtext' : 'text'；去重仍按 text_hash（纯文本）——纯文本相同即命中；命中且旧行 html_content IS NULL 而新 item.html.is_some() 时 UPDATE 补写 html_content + 升 kind='richtext' 再 bump（决策4），text_hash 计算不变"
    category: 功能正确性
    source_anchor: 设计文档§四.任务1 + §一.决策4（纯文本相同即去重 + 补写升级）
    kind: objective
    verify:
      type: test_id
      ref: "ingest_richtext_roundtrip_persists_html_and_kind, html_column_migration_idempotent_on_existing_db, dedup_by_plaintext_unchanged, ingest_backfills_html_and_upgrades_kind_on_hit"
      runner: cd src-tauri && cargo test
      path: src-tauri/src/db.rs
      expect: pass
    evidence_ref: dev-log/richtext-v1/f1-backend-richtext/test.md
    level: 大功能
    status: 待验

